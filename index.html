<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>minetoolskai | Small Caps Unicode</title>
    <meta
      name="description"
      content="Chuyển chữ thường sang small caps Unicode, giữ dấu tiếng Việt, copy nhanh trên điện thoại."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <div class="glow glow-a" aria-hidden="true"></div>
    <div class="glow glow-b" aria-hidden="true"></div>

    <main class="app shell">
      <section class="hero-card">
        <p class="eyebrow">minetoolskai / unicode tool</p>
        <h1>Chuyển chữ thường sang small caps Unicode</h1>
        <p class="lead">
          Nhập văn bản tiếng Việt, công cụ sẽ đổi ngay sang kiểu như:
          <strong>ʙé, ᴠợ, ɴàɴɢ ᴛʜơ, ᴄᴜᴛᴇ, ꜱáᴛ ᴛʜủ</strong>.
        </p>

        <div class="sample">
          <span>Ví dụ</span>
          <p>bé, vợ, nàng thơ, cute, sát thủ.</p>
        </div>
      </section>

      <section class="tool-card">
        <div class="field-head">
          <label for="inputText">Văn bản gốc</label>
          <button id="copyButton" class="copy-button" type="button">Copy</button>
        </div>

        <textarea id="inputText" rows="6" placeholder="Nhập văn bản ở đây...">bé, vợ, nàng thơ, cute, sát thủ.</textarea>

        <label for="outputText" class="output-label">Kết quả small caps</label>
        <textarea id="outputText" rows="6" readonly aria-live="polite"></textarea>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
